name: Deploy to cPanel
# Trigger note: keep this workflow easy to retrigger when secrets or deploy target state change.

on:
  push:
    branches:
      - main
    paths:
      - "booking/**"
      - "*.html"
      - "*.webp"
      - "*.mobileconfig"
      - "manifest.webmanifest"
      - "service-worker.js"
      - "anti-protect.js"
      - "!tmp_*.html"
      - ".htaccess"
      - ".github/workflows/deploy-cpanel.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare root deploy bundle
        run: |
          mkdir -p deploy-root
          for file in index.html inside.html premium.html eyecandy.html rates-menu.html spoil-me.html game-over.html touring.html photos.html iphone_install_card.html 404.html; do
            if [ -f "$file" ]; then
              cp "$file" "deploy-root/$file"
            fi
          done
          if [ -f "BOMBACLOUD_NEW.png" ]; then
            cp BOMBACLOUD_NEW.png deploy-root/BOMBACLOUD_NEW.png
          fi
          if [ -f "eastertheme.webp" ]; then
            cp eastertheme.webp deploy-root/eastertheme.webp
          fi
          if [ -f "manifest.webmanifest" ]; then
            cp manifest.webmanifest deploy-root/manifest.webmanifest
          fi
          if [ -f "service-worker.js" ]; then
            cp service-worker.js deploy-root/service-worker.js
          fi
          if [ -f "booking_admin_iphone.mobileconfig" ]; then
            cp booking_admin_iphone.mobileconfig deploy-root/booking_admin_iphone.mobileconfig
          fi
          if [ -f "anti-protect.js" ]; then
            cp anti-protect.js deploy-root/anti-protect.js
          fi
          cp .htaccess deploy-root/.htaccess

      - name: Deploy root files via FTP
        id: deploy_root_primary
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: deploy-root/
          server-dir: /
          dangerous-clean-slate: false

      - name: Deploy booking portal via FTP
        id: deploy_booking_primary
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: booking/
          server-dir: /booking/
          dangerous-clean-slate: false

      - name: Deploy root files to heidi.bombacloud.com via FTP
        id: deploy_root_bombacloud
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: deploy-root/
          server-dir: /heidi.bombacloud.com/
          dangerous-clean-slate: false

      - name: Deploy booking portal to heidi.bombacloud.com via FTP
        id: deploy_booking_bombacloud
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: booking/
          server-dir: /heidi.bombacloud.com/booking/
          dangerous-clean-slate: false

      - name: Deploy root files to public_html heidi.bombacloud.com via FTP
        id: deploy_root_bombacloud_public_html
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: deploy-root/
          server-dir: /public_html/heidi.bombacloud.com/
          dangerous-clean-slate: false

      - name: Deploy booking portal to public_html heidi.bombacloud.com via FTP
        id: deploy_booking_bombacloud_public_html
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: booking/
          server-dir: /public_html/heidi.bombacloud.com/booking/
          dangerous-clean-slate: false

      - name: Deploy summary
        if: always()
        run: |
          echo "Root primary conclusion: ${{ steps.deploy_root_primary.conclusion }}"
          echo "Booking primary conclusion: ${{ steps.deploy_booking_primary.conclusion }}"
          echo "Root bombacloud conclusion: ${{ steps.deploy_root_bombacloud.conclusion }}"
          echo "Booking bombacloud conclusion: ${{ steps.deploy_booking_bombacloud.conclusion }}"
          echo "Root bombacloud public_html conclusion: ${{ steps.deploy_root_bombacloud_public_html.conclusion }}"
          echo "Booking bombacloud public_html conclusion: ${{ steps.deploy_booking_bombacloud_public_html.conclusion }}"

      - name: Fail if root deploy failed
        if: ${{ always() && steps.deploy_root_primary.conclusion != 'success' }}
        run: |
          echo "ERROR: root deploy failed."
          exit 1

      - name: Fail if booking deploy failed
        if: ${{ always() && steps.deploy_booking_primary.conclusion != 'success' }}
        run: |
          echo "ERROR: booking deploy failed."
          exit 1
