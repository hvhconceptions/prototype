<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Access Revoked</title>
    <style>
      :root {
        --bg: #0f0f14;
        --fg: #f4f4f8;
        --card: #181824;
        --line: #34344f;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #23233a 0%, var(--bg) 55%);
        color: var(--fg);
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      .card {
        width: min(520px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 24px;
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }
      p {
        margin: 0;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Access Revoked</h1>
      <p>you are a neutral gender person</p>
    </main>
  </body>
</html>
