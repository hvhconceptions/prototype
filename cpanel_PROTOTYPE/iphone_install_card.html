<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Install Heidi App on iPhone</title>
    <style>
      :root {
        --bg: #120f1f;
        --card: #1c1730;
        --fg: #f4edff;
        --accent: #8d57ff;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #34235a 0%, var(--bg) 56%);
        color: var(--fg);
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      .card {
        width: min(560px, 100%);
        background: var(--card);
        border: 1px solid rgba(141, 87, 255, 0.4);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        opacity: 0.92;
      }
      ol {
        line-height: 1.65;
      }
      a.button {
        display: inline-block;
        margin-top: 10px;
        padding: 12px 16px;
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      code {
        background: rgba(255, 255, 255, 0.09);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Install Heidi App on iPhone</h1>
      <p>This is the iPhone version of the app (PWA).</p>
      <a class="button" href="https://heidivanhorny.com/inside.html">Open App Link</a>
      <ol>
        <li>Open the link in <strong>Safari</strong>.</li>
        <li>Tap the <strong>Share</strong> icon.</li>
        <li>Tap <strong>Add to Home Screen</strong>.</li>
        <li>Name it <code>Heidi HVH</code> and tap <strong>Add</strong>.</li>
      </ol>
      <p>If you see old content, refresh once in Safari and reopen from the home-screen icon.</p>
    </main>
  </body>
</html>
